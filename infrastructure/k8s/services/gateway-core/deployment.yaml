# Gateway Core - Kubernetes Deployment
# Central API gateway, config owner, MQTT bridge, WebSocket server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-core
  namespace: nexus
  labels:
    app.kubernetes.io/name: gateway-core
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: nexus-edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-core
        app.kubernetes.io/component: api-gateway
        app.kubernetes.io/part-of: nexus-edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gateway-core
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Wait for dependencies
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: wait-for-emqx
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z emqx 1883; do echo waiting for emqx; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: gateway-core
          image: nexus/gateway-core:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          env:
            # Server
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: LOG_LEVEL

            # PostgreSQL (config database)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: DATABASE_URL
            - name: DATABASE_POOL_SIZE
              value: "10"

            # MQTT
            - name: MQTT_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: MQTT_BROKER_MQTT
            - name: MQTT_CLIENT_ID
              value: "gateway-core"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: MQTT_PASSWORD

            # Service discovery (proxy targets)
            - name: PROTOCOL_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: PROTOCOL_GATEWAY_URL
            - name: DATA_INGESTION_URL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: DATA_INGESTION_URL

            # CORS
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: CORS_ORIGIN

            # Auth (Authentik OIDC)
            - name: AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: AUTH_ENABLED
            - name: OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: OIDC_ISSUER_URL
                  optional: true
            - name: OIDC_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: OIDC_AUDIENCE
                  optional: true

            # Features
            - name: AUDIT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: AUDIT_ENABLED
            - name: RATE_LIMIT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: gateway-core-config
                  key: RATE_LIMIT_ENABLED

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: gateway-core
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
