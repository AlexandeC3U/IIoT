# Gateway Core - Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: gateway-core
  namespace: nexus
  labels:
    app.kubernetes.io/name: gateway-core
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/part-of: nexus-edge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway-core
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
