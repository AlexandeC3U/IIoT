# Protocol Gateway V2 - Kubernetes Service
# All endpoints (API, health, metrics) are served on single port 8080
apiVersion: v1
kind: Service
metadata:
  name: protocol-gateway
  namespace: nexus
  labels:
    app.kubernetes.io/name: protocol-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: nexus-edge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: protocol-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

---
# Headless service for StatefulSet DNS (required for stable network identity)
apiVersion: v1
kind: Service
metadata:
  name: protocol-gateway-headless
  namespace: nexus
  labels:
    app.kubernetes.io/name: protocol-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: nexus-edge
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: protocol-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http

