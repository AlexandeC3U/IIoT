# Protocol Gateway - Kubernetes StatefulSet
# Single-replica stateful deployment for industrial protocol gateway
# Handles OPC UA, Modbus, S7 → MQTT conversion
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: protocol-gateway
  namespace: nexus
  labels:
    app.kubernetes.io/name: protocol-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: nexus-edge
spec:
  replicas: 1  # Single instance - protocol gateways don't horizontally scale
  serviceName: protocol-gateway
  selector:
    matchLabels:
      app.kubernetes.io/name: protocol-gateway
  
  # Ordered pod management for clean shutdown
  podManagementPolicy: OrderedReady
  
  template:
    metadata:
      labels:
        app.kubernetes.io/name: protocol-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: nexus-edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: protocol-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Graceful shutdown - must be > 30s (gateway's internal shutdown timeout)
      terminationGracePeriodSeconds: 35
      
      containers:
        - name: protocol-gateway
          image: nexus/protocol-gateway:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          env:
            # MQTT Configuration
            - name: MQTT_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: MQTT_BROKER
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: MQTT_PASSWORD
            
            # Logging
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: LOG_LEVEL
            
            # Device config path
            - name: DEVICES_CONFIG_PATH
              value: "/app/config/devices.yaml"
            
            # Environment
            - name: ENVIRONMENT
              value: "production"
            
            # Pod identity
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          
          volumeMounts:
            # Application config
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
              readOnly: true
            
            # Device definitions
            - name: devices
              mountPath: /app/config/devices.yaml
              subPath: devices.yaml
              readOnly: true
            
            # OPC UA PKI trust store (persistent)
            - name: pki-store
              mountPath: /app/certs/pki
          
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          
          # Startup probe - allows time for initial device connections
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30  # 150 seconds max startup
          
          # Liveness probe - restart if process is hung
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe - remove from service if not ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # PKI store needs writes
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: config
          configMap:
            name: protocol-gateway-config
        - name: devices
          configMap:
            name: protocol-gateway-devices
  
  # Persistent volume for PKI trust store
  volumeClaimTemplates:
    - metadata:
        name: pki-store
        labels:
          app.kubernetes.io/name: protocol-gateway
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
