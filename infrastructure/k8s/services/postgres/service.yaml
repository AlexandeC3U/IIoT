# PostgreSQL (Config DB) - Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nexus
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: config-database
    app.kubernetes.io/part-of: nexus-edge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
