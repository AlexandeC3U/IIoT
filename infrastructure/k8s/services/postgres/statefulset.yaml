# PostgreSQL (Config DB) - StatefulSet
# Stores gateway-core configuration: devices, tags, audit log
# Single-node deployment (for HA, use CloudNativePG or Patroni)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nexus
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: config-database
    app.kubernetes.io/part-of: nexus-edge
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: config-database
        app.kubernetes.io/part-of: nexus-edge
    spec:
      serviceAccountName: postgres
      securityContext:
        fsGroup: 999

      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/postgresql/data']
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_DB
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"

          args:
            - "-c"
            - "shared_buffers=256MB"
            - "-c"
            - "effective_cache_size=768MB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "max_connections=100"
            - "-c"
            - "statement_timeout=30000"
            - "-c"
            - "idle_in_transaction_session_timeout=60000"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      terminationGracePeriodSeconds: 60

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
