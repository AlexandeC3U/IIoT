# NEXUS Edge Platform - Shared Configuration
# ConfigMaps for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
    app.kubernetes.io/part-of: nexus-edge
data:
  # MQTT Broker Configuration
  MQTT_BROKER: "tcp://emqx:1883"
  MQTT_CLIENT_ID_PREFIX: "nexus"
  MQTT_QOS: "1"
  
  # Database Configuration
  TIMESCALEDB_HOST: "timescaledb"
  TIMESCALEDB_PORT: "5432"
  TIMESCALEDB_DATABASE: "nexus_historian"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Service Discovery
  PROTOCOL_GATEWAY_URL: "http://protocol-gateway:8080"
  DATA_INGESTION_URL: "http://data-ingestion:8080"
  MQTT_BROKER_MQTT: "mqtt://emqx:1883"

  # Health Check
  HEALTH_CHECK_INTERVAL: "30s"

---
# Protocol Gateway specific config
apiVersion: v1
kind: ConfigMap
metadata:
  name: protocol-gateway-config
  namespace: nexus
  labels:
    app.kubernetes.io/name: protocol-gateway
    app.kubernetes.io/part-of: nexus-edge
data:
  config.yaml: |
    server:
      port: 8080
      healthPort: 8081
    
    mqtt:
      broker: "${MQTT_BROKER}"
      clientIdPrefix: "${MQTT_CLIENT_ID_PREFIX}-gateway"
      qos: 1
      keepAlive: 60s
      connectTimeout: 30s
      reconnectInterval: 5s
    
    polling:
      defaultInterval: 1s
      workers: 10
      batchSize: 100
    
    protocols:
      modbus:
        enabled: true
        timeout: 5s
        retries: 3
        poolSize: 10
      opcua:
        enabled: true
        timeout: 10s
        poolSize: 5
      s7:
        enabled: true
        timeout: 5s
        poolSize: 5
    
    circuitBreaker:
      failureThreshold: 5
      resetTimeout: 30s

---
# Data Ingestion specific config
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-ingestion-config
  namespace: nexus
  labels:
    app.kubernetes.io/name: data-ingestion
    app.kubernetes.io/part-of: nexus-edge
data:
  config.yaml: |
    server:
      port: 8080
      healthPort: 8081
    
    mqtt:
      broker: "${MQTT_BROKER}"
      clientIdPrefix: "${MQTT_CLIENT_ID_PREFIX}-ingestion"
      qos: 1
      # Shared subscriptions for load balancing
      topics:
        - "$share/ingestion/dev/#"
        - "$share/ingestion/uns/#"
    
    database:
      host: "${TIMESCALEDB_HOST}"
      port: 5432
      database: "${TIMESCALEDB_DATABASE}"
      pool_size: 20

    ingestion:
      buffer_size: 200000
      batch_size: 10000
      flush_interval: 250ms
      writer_count: 8
      use_copy_protocol: true

---
# Gateway Core specific config
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-core-config
  namespace: nexus
  labels:
    app.kubernetes.io/name: gateway-core
    app.kubernetes.io/part-of: nexus-edge
data:
  # CORS (comma-separated origins, or "*" for dev)
  CORS_ORIGIN: "*"
  # Auth (disable for dev, enable in prod overlay)
  AUTH_ENABLED: "false"
  OIDC_ISSUER_URL: ""
  OIDC_AUDIENCE: ""
  # Features
  AUDIT_ENABLED: "true"
  RATE_LIMIT_ENABLED: "false"

