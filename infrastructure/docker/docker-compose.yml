# ═══════════════════════════════════════════════════════════════════════════════
# NEXUS EDGE - Industrial IoT Platform
# Docker Compose Configuration
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  nexus-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  nexus-ot:
    driver: bridge
    # This network should bridge to the OT network interface

volumes:
  emqx-data:
  emqx-log:
  timescale-data:
  postgres-data:
  grafana-data:
  gateway-logs:
  protocol-gateway-pki:
  prometheus-data:

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # CORE INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # EMQX MQTT Broker
  # High-performance MQTT broker for unified messaging
  # ─────────────────────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.3.2
    container_name: nexus-emqx
    hostname: emqx
    restart: unless-stopped
    environment:
      - EMQX_NAME=nexus-emqx
      - EMQX_HOST=emqx
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_NODE__COOKIE=nexus_secret_cookie
      # Authentication
      - EMQX_ALLOW_ANONYMOUS=false
      - EMQX_LISTENERS__TCP__DEFAULT__ENABLE=true
      - EMQX_LISTENERS__SSL__DEFAULT__ENABLE=true
      # Performance tuning
      - EMQX_LISTENERS__TCP__DEFAULT__MAX_CONNECTIONS=100000
      - EMQX_MQTT__MAX_TOPIC_LEVELS=10
    ports:
      - "1884:1883"      # MQTT TCP
      - "8883:8883"      # MQTT SSL
      - "8083:8083"      # MQTT WebSocket
      - "8084:8084"      # MQTT WebSocket SSL
      - "18083:18083"    # Dashboard (internal only in prod)
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - ./config/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./config/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./config/emqx/healthcheck.sh:/healthcheck.sh:ro
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD", "sh", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # TimescaleDB (Historian)
  # Time-series database for industrial data storage
  # ─────────────────────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg15
    container_name: nexus-historian
    hostname: historian
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${HISTORIAN_USER:-nexus}
      - POSTGRES_PASSWORD=${HISTORIAN_PASSWORD:-nexus_historian_secret}
      - POSTGRES_DB=${HISTORIAN_DB:-nexus_historian}
      # Performance tuning for time-series
      - POSTGRES_INITDB_ARGS=--data-checksums
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ../../config/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HISTORIAN_USER:-nexus} -d ${HISTORIAN_DB:-nexus_historian}"]
      interval: 30s
      timeout: 10s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL (Configuration Store)
  # Relational database for app configuration, users, etc.
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nexus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_config_secret}
      - POSTGRES_DB=${POSTGRES_DB:-nexus_config}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_config}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # NEXUS SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # Gateway Core (TypeScript/Fastify)
  # Device & Tag management API, MQTT config notifications
  # ─────────────────────────────────────────────────────────────────────────────
  gateway-core:
    build:
      context: ../../services/gateway-core
      dockerfile: Dockerfile
    image: nexus/gateway-core:${VERSION:-latest}
    container_name: nexus-gateway-core
    hostname: gateway-core
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # PostgreSQL config database
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_config_secret}@postgres:5432/${POSTGRES_DB:-nexus_config}
      - DATABASE_POOL_SIZE=10
      # MQTT connection for config notifications
      - MQTT_BROKER_URL=mqtt://emqx:1883
      - MQTT_CLIENT_ID=gateway-core
      - MQTT_USERNAME=${MQTT_GATEWAY_USER:-gateway}
      - MQTT_PASSWORD=${MQTT_GATEWAY_PASS:-gateway_secret}
      # CORS (for frontend)
      - CORS_ORIGIN=http://localhost:5173,http://localhost:8080,http://web-ui
      # JWT (for future auth)
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=24h
    ports:
      - "3001:3001"
    volumes:
      - gateway-logs:/app/logs
    networks:
      - nexus-internal
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Protocol Gateway V2 (Go)
  # Industrial protocol conversion (S7, OPC UA, Modbus → MQTT)
  # Features: REST API, OPC UA subscriptions/browse, PKI trust store, NTP drift
  # ─────────────────────────────────────────────────────────────────────────────
  protocol-gateway:
    build:
      context: ../../services/protocol-gateway
      dockerfile: Dockerfile
    image: nexus/protocol-gateway:${VERSION:-latest}
    container_name: nexus-protocol-gateway
    hostname: protocol-gateway
    restart: unless-stopped
    environment:
      # General
      - ENVIRONMENT=${NEXUS_ENV:-production}
      - DEVICES_CONFIG_PATH=/app/config/devices.yaml
      # HTTP Server (unified port for API, health, metrics)
      - HTTP_PORT=8080
      # MQTT connection
      - MQTT_BROKER_URL=tcp://emqx:1883
      - MQTT_CLIENT_ID=protocol-gateway-1
      - MQTT_USERNAME=${MQTT_PROTOCOL_USER:-}
      - MQTT_PASSWORD=${MQTT_PROTOCOL_PASS:-}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=json
      # API Security (enable in production)
      - API_AUTH_ENABLED=${API_AUTH_ENABLED:-false}
      - API_KEY=${API_KEY:-}
      # Go runtime tuning
      - GOMAXPROCS=4
      - GOGC=100
    ports:
      - "8085:8080"    # API, health, metrics (avoid conflict with web-ui:8080)
    volumes:
      # Device configuration (can also use ConfigMap in K8s)
      - ../../services/protocol-gateway/config/devices.yaml:/app/config/devices.yaml:ro
      # PKI trust store for OPC UA certificates (persistent)
      - protocol-gateway-pki:/app/certs/pki
      # Optional: Docker socket for container log access in Web UI
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nexus-internal
      - nexus-ot  # Access to OT network for PLC communication
    depends_on:
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Data Ingestion Service (Go)
  # High-throughput MQTT to TimescaleDB ingestion using pgx COPY protocol
  # ─────────────────────────────────────────────────────────────────────────────
  data-ingestion:
    build:
      context: ../../services/data-ingestion
      dockerfile: Dockerfile
    image: nexus/data-ingestion:${VERSION:-latest}
    container_name: nexus-data-ingestion
    hostname: data-ingestion
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${NEXUS_ENV:-production}
      # MQTT connection for data ingestion (shared subscriptions for scaling)
      - INGESTION_MQTT_BROKER_URL=tcp://emqx:1883
      - MQTT_USERNAME=${MQTT_INGESTION_USER:-ingestion}
      - MQTT_PASSWORD=${MQTT_INGESTION_PASS:-ingestion_secret}
      - INGESTION_MQTT_CLIENT_ID=data-ingestion-1
      # TimescaleDB connection
      - INGESTION_DB_HOST=historian
      - INGESTION_DB_PORT=5432
      - INGESTION_DB_USER=${HISTORIAN_USER:-nexus_ingestion}
      - INGESTION_DB_PASSWORD=${HISTORIAN_PASSWORD:-nexus_historian_secret}
      - INGESTION_DB_NAME=${HISTORIAN_DB:-nexus_historian}
      # Logging
      - INGESTION_LOGGING_LEVEL=${LOG_LEVEL:-info}
      # Go runtime tuning
      - GOMAXPROCS=4
      - GOGC=100
    ports:
      - "7000:8080"
    networks:
      - nexus-internal
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # NEXUS Control Center (React Frontend)
  # Unified web interface (React + Vite + TailwindCSS)
  # Serves static files via Nginx, proxies API calls to gateway-core
  # ─────────────────────────────────────────────────────────────────────────────
  web-ui:
    build:
      context: ../../services/web-ui
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    image: nexus/web-ui:${VERSION:-latest}
    container_name: nexus-web-ui
    hostname: web-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - nexus-internal
    depends_on:
      - gateway-core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # SSL termination and routing
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - nexus-internal
    depends_on:
      - web-ui
      - gateway-core

# ═══════════════════════════════════════════════════════════════════════════
# MONITORING (Prometheus + Grafana)
# Start with: docker-compose --profile monitoring up
# ═══════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # Prometheus - Metrics Collection
  # Scrapes metrics from all services (protocol-gateway, data-ingestion, EMQX)
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nexus-prometheus
    hostname: prometheus
    restart: unless-stopped
    profiles:
      - monitoring  # Only start with: docker-compose --profile monitoring up
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Grafana - Metrics Visualization
  # Pre-configured with Prometheus datasource
  # ─────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: nexus-grafana
    hostname: grafana
    restart: unless-stopped
    profiles:
      - monitoring  # Only start with: docker-compose --profile monitoring up
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Anonymous access for embedding
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Use local provisioning config (has Prometheus + TimescaleDB + PostgreSQL datasources)
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      # Reuse dashboard JSON files from protocol-gateway service
      - ../../services/protocol-gateway/config/grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
    networks:
      - nexus-internal
    depends_on:
      prometheus:
        condition: service_healthy
      timescaledb:
        condition: service_healthy


  # ─────────────────────────────────────────────────────────────────────────────
  # OPC UA Simulator for testing
  # ─────────────────────────────────────────────────────────────────────────────
  opcua-simulator:
    build:
      context: ../../services/protocol-gateway/tools/opcua-simulator
      dockerfile: Dockerfile
    container_name: nexus-opcua-sim
    profiles:
      - testing  # Only start with: docker-compose --profile testing up
    ports:
      - "4840:4840"
    environment:
      - OPCUA_HOST=0.0.0.0
      - OPCUA_PORT=4840
      - OPCUA_AUTO_UPDATE=1
      - OPCUA_UPDATE_MS=500
    networks:
      - nexus-internal
